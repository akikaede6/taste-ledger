name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Format, lint, test, and build
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build web app
        run: npm run build

  artifacts:
    name: Build Android and desktop artifacts
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android
            runner: ubuntu-latest
            build_script: android:build
            artifact_name: ranking-android-debug-apk
            artifact_path: android/app/build/outputs/apk/debug/app-debug.apk
            setup_java: true
            setup_android: true
          - target: linux
            runner: ubuntu-latest
            build_script: electron:build
            artifact_name: ranking-linux-appimage
            artifact_path: dist-electron/*.AppImage
            setup_java: false
            setup_android: false
          - target: windows
            runner: windows-latest
            build_script: electron:build
            artifact_name: ranking-windows-installer
            artifact_path: dist-electron/*.exe
            setup_java: false
            setup_android: false
          - target: macos
            runner: macos-latest
            build_script: electron:build
            artifact_name: ranking-macos-dmg
            artifact_path: dist-electron/*.dmg
            setup_java: false
            setup_android: false
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        if: matrix.setup_java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        if: matrix.setup_android
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        if: matrix.setup_android
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build artifact
        run: npm run ${{ matrix.build_script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: artifacts
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ranking-*
          path: release-assets

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          tag="build-${{ github.run_id }}-${{ github.run_attempt }}"
          title="CI build #${{ github.run_number }}.${{ github.run_attempt }}"
          notes="Automated build for commit ${{ github.sha }} on branch ${{ github.ref_name }}."

          mapfile -d '' files < <(
            find release-assets -type f \( \
              -name '*.apk' -o \
              -name '*.AppImage' -o \
              -name '*.exe' -o \
              -name '*.dmg' \
            \) -print0
          )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          printf 'Release assets:\n'
          printf ' - %s\n' "${files[@]}"

          gh release create "$tag" \
            --repo "$GH_REPO" \
            --title "$title" \
            --notes "$notes" \
            --target "${{ github.sha }}" \
            --prerelease \
            "${files[@]}"
