name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Format, lint, test, and build
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build web app
        run: npm run build

  artifacts:
    name: Build Android and desktop artifacts
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android
            build_script: android:build
            artifact_name: ranking-android-debug-apk
            artifact_path: android/app/build/outputs/apk/debug/app-debug.apk
            setup_java: true
            setup_android: true
          - target: desktop
            build_script: electron:build
            artifact_name: ranking-linux-appimage
            artifact_path: dist-electron/*.AppImage
            setup_java: false
            setup_android: false
    env:
      ELECTRON_CACHE: ~/.cache/electron
      ELECTRON_BUILDER_CACHE: ~/.cache/electron-builder
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        if: matrix.setup_java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        if: matrix.setup_android
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build artifact
        run: npm run ${{ matrix.build_script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
